<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Silent SSO check</title>
  </head>
  <body>
    <!-- Loaded by keycloak-js in a hidden iframe during `check-sso` init; it
         relays the auth response back to the SPA without a visible redirect. -->
    <script>
      parent.postMessage(location.href, location.origin)
    </script>
  </body>
</html>
