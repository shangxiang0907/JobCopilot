[tool.uv.workspace]
members = ["packages/*", "services/*"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ASYNC", "S", "B"]

[tool.ruff.lint.per-file-ignores]
# Tests may use assert, fixed credentials, etc. (S) and long fixture names (N).
# Must be "**/tests/**": tests live in services/*/tests/ and packages/*/tests/,
# which a bare "tests/**" (repo-root only) never matched.
"**/tests/**" = ["S", "N"]
# Infrastructure init scripts use urllib stdlib for HTTP calls to admin-controlled
# internal URLs; S310 (urlopen scheme audit) and S110 (except-pass) are intentional.
"infra/keycloak/init-realm.py" = ["S310", "S110"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"
testpaths = ["packages", "services"]
markers = [
    "integration: marks tests requiring real external services (postgres, redis, rabbitmq)",
]

[dependency-groups]
dev = [
    "mypy>=1.10.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "ruff>=0.15.20",
]
