[tool.uv.workspace]
members = ["packages/*", "services/*"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ASYNC", "S", "B"]
ignore = [
    "S101",  # allow assert in tests
    "S105",  # allow hardcoded passwords in tests
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "N"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages", "services"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
    "ruff>=0.15.16",
]
