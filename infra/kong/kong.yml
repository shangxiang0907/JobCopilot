_format_version: "3.0"
_transform: true

# DB-less declarative config for Kong 3.x.
# JWT validation is handled at the FastAPI service layer via jobcopilot_shared.auth.
# Kong is responsible only for routing and rate-limiting; no JWT plugin needed here.

# Global safety net: coarse per-IP limit across every route. NOTE: in production
# Kong sits behind the Next.js server-side rewrite, so the "IP" it sees is the
# frontend container — this bucket is effectively a whole-site request cap, sized
# accordingly. `policy: local` is correct for single-node; switch to `redis` if
# Kong ever scales horizontally.
plugins:
  - name: rate-limiting
    config:
      minute: 600
      policy: local
      limit_by: ip
      fault_tolerant: true
  # Gateway metrics, scraped by Prometheus from the status API (:8100/metrics).
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

services:
  - name: profile-svc
    host: profile-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: profile-routes
        paths:
          - /v1/profiles
          - /v1/resumes
          - /v1/admin/users
        strip_path: false
        preserve_host: false

  - name: job-svc
    host: job-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: job-routes
        paths:
          - /v1/jobs
          - /v1/companies
          - /v1/applications
        strip_path: false
        preserve_host: false

  - name: discovery-svc
    host: discovery-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 120000
    write_timeout: 120000
    routes:
      - name: discovery-routes
        paths:
          - /v1/admin/usage/crawls
          - /v1/discovery
        strip_path: false
        preserve_host: false

  - name: agent-svc
    host: agent-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 300000
    write_timeout: 300000
    routes:
      - name: agent-routes
        paths:
          - /v1/admin/usage/ai
          - /v1/agent
        strip_path: false
        preserve_host: false
    plugins:
      # Every agent request fans out to LLM calls (real money). Limit per user by
      # bucketing on the Authorization header (per-JWT ≈ per-user; tokens rotate
      # every 5 min which only resets the bucket). Client IP is useless here —
      # in prod Kong only ever sees the frontend container's IP.
      - name: rate-limiting
        config:
          minute: 20
          policy: local
          limit_by: header
          header_name: authorization
          fault_tolerant: true

  - name: notification-svc
    host: notification-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: notification-routes
        paths:
          - /v1/notifications
        strip_path: false
        preserve_host: false

# Health-check routes (no auth, for smoke testing and external monitoring).
  - name: profile-health-svc
    host: profile-service
    port: 8000
    protocol: http
    path: /healthz/ready
    routes:
      - name: profile-health-route
        paths:
          - /healthz/profile-service
        strip_path: true
        methods: [GET]

  - name: job-health-svc
    host: job-service
    port: 8000
    protocol: http
    path: /healthz/ready
    routes:
      - name: job-health-route
        paths:
          - /healthz/job-service
        strip_path: true
        methods: [GET]

  - name: discovery-health-svc
    host: discovery-service
    port: 8000
    protocol: http
    path: /healthz/ready
    routes:
      - name: discovery-health-route
        paths:
          - /healthz/discovery-service
        strip_path: true
        methods: [GET]

  - name: agent-health-svc
    host: agent-service
    port: 8000
    protocol: http
    path: /healthz/ready
    routes:
      - name: agent-health-route
        paths:
          - /healthz/agent-service
        strip_path: true
        methods: [GET]

  - name: notification-health-svc
    host: notification-service
    port: 8000
    protocol: http
    path: /healthz/ready
    routes:
      - name: notification-health-route
        paths:
          - /healthz/notification-service
        strip_path: true
        methods: [GET]
