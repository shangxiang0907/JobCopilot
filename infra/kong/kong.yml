_format_version: "3.0"
_transform: true

# DB-less declarative config for Kong 3.x.
# Internal /internal/* paths are not routed here — Kong never exposes them externally.

services:
  - name: profile-svc
    host: profile-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: profile-routes
        paths:
          - /v1/profiles
          - /v1/resumes
        strip_path: false
        preserve_host: false

  - name: job-svc
    host: job-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: job-routes
        paths:
          - /v1/jobs
          - /v1/companies
          - /v1/applications
        strip_path: false
        preserve_host: false

  - name: discovery-svc
    host: discovery-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 120000
    write_timeout: 120000
    routes:
      - name: discovery-routes
        paths:
          - /v1/discovery
        strip_path: false
        preserve_host: false

  - name: agent-svc
    host: agent-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 300000
    write_timeout: 300000
    routes:
      - name: agent-routes
        paths:
          - /v1/agent
        strip_path: false
        preserve_host: false

  - name: notification-svc
    host: notification-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: notification-routes
        paths:
          - /v1/notifications
        strip_path: false
        preserve_host: false
