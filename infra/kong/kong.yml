_format_version: "3.0"
_transform: true

# DB-less declarative config for Kong 3.x.
# JWT validation is handled at the FastAPI service layer via jobcopilot_shared.auth.
# Kong is responsible only for routing and rate-limiting; no JWT plugin needed here.

services:
  - name: profile-svc
    host: profile-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: profile-routes
        paths:
          - /v1/profiles
          - /v1/resumes
        strip_path: false
        preserve_host: false

  - name: job-svc
    host: job-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: job-routes
        paths:
          - /v1/jobs
          - /v1/companies
          - /v1/applications
        strip_path: false
        preserve_host: false

  - name: discovery-svc
    host: discovery-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 120000
    write_timeout: 120000
    routes:
      - name: discovery-routes
        paths:
          - /v1/discovery
        strip_path: false
        preserve_host: false

  - name: agent-svc
    host: agent-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 300000
    write_timeout: 300000
    routes:
      - name: agent-routes
        paths:
          - /v1/agent
        strip_path: false
        preserve_host: false

  - name: notification-svc
    host: notification-service
    port: 8000
    protocol: http
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: notification-routes
        paths:
          - /v1/notifications
        strip_path: false
        preserve_host: false

# Health-check routes (no auth, for smoke testing and external monitoring).
  - name: profile-health-svc
    host: profile-service
    port: 8000
    protocol: http
    path: /healthz/ready
    routes:
      - name: profile-health-route
        paths:
          - /healthz/profile-service
        strip_path: true
        methods: [GET]

  - name: job-health-svc
    host: job-service
    port: 8000
    protocol: http
    path: /healthz/ready
    routes:
      - name: job-health-route
        paths:
          - /healthz/job-service
        strip_path: true
        methods: [GET]

  - name: discovery-health-svc
    host: discovery-service
    port: 8000
    protocol: http
    path: /healthz/ready
    routes:
      - name: discovery-health-route
        paths:
          - /healthz/discovery-service
        strip_path: true
        methods: [GET]

  - name: agent-health-svc
    host: agent-service
    port: 8000
    protocol: http
    path: /healthz/ready
    routes:
      - name: agent-health-route
        paths:
          - /healthz/agent-service
        strip_path: true
        methods: [GET]

  - name: notification-health-svc
    host: notification-service
    port: 8000
    protocol: http
    path: /healthz/ready
    routes:
      - name: notification-health-route
        paths:
          - /healthz/notification-service
        strip_path: true
        methods: [GET]
