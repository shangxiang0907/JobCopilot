# ─────────────────────────────────────────────────────────────────────────────
# Production overlay — Hetzner single-node deployment.
#
# Usage: deploy via infra/scripts/deploy.sh (it resolves image digests, ships the
# env, and runs `docker compose ... pull && up -d --no-build`). This overlay is
# NOT meant to be run by hand — the *_IMAGE_DIGEST vars below are mandatory.
#
# What it adds on top of the local base file:
#   • Caddy edge proxy with automatic Let's Encrypt TLS (the ONLY public ingress)
#   • Every internal service rebound to 127.0.0.1 (defense-in-depth behind the
#     hcloud firewall; also sidesteps Docker's iptables bypass of host firewalls)
#   • Keycloak switched to production `start` mode behind the TLS-terminating proxy
#   • A pg_dumpall backup sidecar (nightly, 7-day retention)
#   • The 6 app images pinned by IMMUTABLE DIGEST (not a mutable tag). Production
#     must NEVER resolve to :latest, so each ref uses a mandatory `${..:?}` digest
#     var — a missing digest hard-fails compose instead of silently pulling latest.
#
# Requires infra/.env with (see .env.example "Cloud Deployment" section):
#   SERVER_HOST, KEYCLOAK_PUBLIC_URL, FRONTEND_PUBLIC_URL, ENCRYPTION_KEY,
#   POSTGRES_PASSWORD, RABBITMQ_PASSWORD, KEYCLOAK_ADMIN_PASSWORD
# plus the per-service *_IMAGE_DIGEST vars, which deploy.sh resolves from the
# git-SHA image tags and injects automatically — do NOT set them by hand.
#
# NOTE: the `!override` tag REPLACES the base `ports:` list instead of merging it
# (Compose merges sequences by default, which would otherwise keep the public
# 0.0.0.0 bindings). Requires Docker Compose >= 2.24.4.
# ─────────────────────────────────────────────────────────────────────────────

name: jobcopilot

services:

  # ── Edge proxy: terminates TLS, the only service bound to public 80/443 ──────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - keycloak
    environment:
      # Apex domain; the Caddyfile derives auth.<SERVER_HOST> from it.
      SERVER_HOST: ${SERVER_HOST:?set SERVER_HOST in infra/.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"      # HTTP/3 (QUIC)
    volumes:
      # Mount the DIRECTORY, not the file: rsync (and most editors) replace a
      # file via tmp-file + rename, which orphans a single-file bind mount — the
      # container keeps the old inode and `caddy reload` re-reads stale config.
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data    # persisted ACME certs/account — MUST survive restarts
      - caddy_config:/config

  # ── Rebind every internal service to loopback only ──────────────────────────
  #
  # NOTE on the ${..:?} overrides below: the base file falls back to dev defaults
  # (postgres / guest / admin) so plain `docker compose up` works locally. In
  # production those fallbacks must be fatal. A single failing interpolation
  # aborts the ENTIRE compose file, so overriding each variable once — at its
  # canonical consumer — is sufficient to hard-fail any prod invocation that is
  # missing a real credential (deploy.sh checks too; this covers manual runs).
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD in infra/.env — dev fallback forbidden in prod}
    ports: !override
      - "127.0.0.1:5432:5432"

  redis:
    ports: !override
      - "127.0.0.1:6379:6379"

  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set a strong RABBITMQ_PASSWORD in infra/.env — dev fallback forbidden in prod}
    ports: !override
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"

  qdrant:
    ports: !override
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"

  temporal:
    ports: !override
      - "127.0.0.1:7233:7233"

  temporal-ui:
    # Internal ops tool — reach it via SSH tunnel: ssh -L 8233:localhost:8233 <server>
    ports: !override
      - "127.0.0.1:8233:8080"

  kong:
    # Kong is internal-only; the frontend proxies /v1/* to it over the Docker network.
    ports: !override
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8001:8001"

  # ── Keycloak: production mode behind the TLS-terminating Caddy proxy ─────────
  keycloak:
    command: ["start", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set a strong KEYCLOAK_ADMIN_PASSWORD in infra/.env — dev fallback forbidden in prod}
      KC_PROXY_HEADERS: xforwarded     # trust X-Forwarded-* from Caddy
      KC_HOSTNAME_STRICT: "true"       # override base's dev "false"
    ports: !override
      - "127.0.0.1:8080:8080"

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set a strong GRAFANA_ADMIN_PASSWORD in infra/.env — dev fallback forbidden in prod}

  frontend:
    image: ghcr.io/shangxiang0907/jobcopilot-frontend@${FRONTEND_IMAGE_DIGEST:?FRONTEND_IMAGE_DIGEST unset — deploy via infra/scripts/deploy.sh}
    ports: !override
      - "127.0.0.1:3000:3000"

  profile-service:
    image: ghcr.io/shangxiang0907/jobcopilot-profile@${PROFILE_IMAGE_DIGEST:?PROFILE_IMAGE_DIGEST unset — deploy via infra/scripts/deploy.sh}
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in infra/.env — it encrypts stored LinkedIn cookies}
    ports: !override
      - "127.0.0.1:8010:8000"

  job-service:
    image: ghcr.io/shangxiang0907/jobcopilot-job@${JOB_IMAGE_DIGEST:?JOB_IMAGE_DIGEST unset — deploy via infra/scripts/deploy.sh}
    ports: !override
      - "127.0.0.1:8011:8000"

  discovery-service:
    image: ghcr.io/shangxiang0907/jobcopilot-discovery@${DISCOVERY_IMAGE_DIGEST:?DISCOVERY_IMAGE_DIGEST unset — deploy via infra/scripts/deploy.sh}
    ports: !override
      - "127.0.0.1:8012:8000"

  agent-service:
    image: ghcr.io/shangxiang0907/jobcopilot-agent@${AGENT_IMAGE_DIGEST:?AGENT_IMAGE_DIGEST unset — deploy via infra/scripts/deploy.sh}
    ports: !override
      - "127.0.0.1:8013:8000"

  notification-service:
    image: ghcr.io/shangxiang0907/jobcopilot-notification@${NOTIFICATION_IMAGE_DIGEST:?NOTIFICATION_IMAGE_DIGEST unset — deploy via infra/scripts/deploy.sh}
    ports: !override
      - "127.0.0.1:8014:8000"

  # ── Logical backup sidecar: nightly pg_dumpall (captures jobcopilot + keycloak
  #    + temporal databases and roles), keep 7 days. Restore with:
  #      gunzip -c all-YYYYMMDD-HHMMSS.sql.gz | docker compose exec -T postgres psql -U postgres
  pg-backup:
    image: postgres:15-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:?}
    volumes:
      - pg_backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[pg-backup] sidecar started -> /backups (daily, 7-day retention)"
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          if pg_dumpall --clean | gzip > /backups/all-$$ts.sql.gz; then
            echo "[pg-backup] wrote all-$$ts.sql.gz"
          else
            echo "[pg-backup] dump FAILED at $$ts"
            rm -f /backups/all-$$ts.sql.gz
          fi
          find /backups -name '*.sql.gz' -mtime +7 -delete
          sleep 86400
        done

  # ── Offsite backup sync: mirrors /backups to an S3-compatible bucket ─────────
  #    (Cloudflare R2 / Backblaze B2 free tiers are plenty; MinIO/AWS also work.)
  #    Opt-in via COMPOSE_PROFILES=offsite-backup in infra/.env plus the
  #    BACKUP_S3_* vars (see .env.example). `rclone copy` never propagates local
  #    deletions, so remote retention (30d) is independent of the local 7d prune —
  #    a compromised/dead server cannot take the offsite copies with it. Enable
  #    object versioning on the bucket for extra protection against overwrites.
  pg-backup-sync:
    image: rclone/rclone:1
    restart: unless-stopped
    profiles: ["offsite-backup"]
    depends_on:
      - pg-backup
    environment:
      RCLONE_CONFIG_OFFSITE_TYPE: s3
      RCLONE_CONFIG_OFFSITE_PROVIDER: ${BACKUP_S3_PROVIDER:-Other}
      RCLONE_CONFIG_OFFSITE_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      RCLONE_CONFIG_OFFSITE_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_OFFSITE_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_OFFSITE_REGION: ${BACKUP_S3_REGION:-auto}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
    volumes:
      - pg_backups:/backups:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -z "$$RCLONE_CONFIG_OFFSITE_ENDPOINT" ] || [ -z "$$RCLONE_CONFIG_OFFSITE_ACCESS_KEY_ID" ] \
           || [ -z "$$RCLONE_CONFIG_OFFSITE_SECRET_ACCESS_KEY" ] || [ -z "$$BACKUP_S3_BUCKET" ]; then
          echo "[pg-backup-sync] BACKUP_S3_* configuration incomplete — see infra/.env.example"
          exit 1
        fi
        echo "[pg-backup-sync] mirroring /backups -> offsite:$$BACKUP_S3_BUCKET/pg every 6h (remote retention 30d)"
        while true; do
          if rclone copy /backups "offsite:$$BACKUP_S3_BUCKET/pg" --s3-no-check-bucket; then
            rclone delete "offsite:$$BACKUP_S3_BUCKET/pg" --min-age 30d --s3-no-check-bucket || true
            echo "[pg-backup-sync] copy OK at $$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            echo "[pg-backup-sync] copy FAILED at $$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          sleep 21600
        done

volumes:
  caddy_data:
  caddy_config:
  pg_backups:
