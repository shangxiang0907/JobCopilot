# JobCopilot additions — keys used by the login-verify-email.ftl override.
emailVerifyCrossDeviceHint=Opened the link on another device (for example your phone)? Finish the steps there, then continue here.
emailVerifyContinue=I have verified my email — continue to sign in

# Softened stock message. It appears both on a genuine timeout AND after the
# email-verification link was completed on another device (the action token
# consumes the original browser's auth session, so continuing here restarts
# the flow). The stock wording ("timed out") reads like an error in the
# second — for us, far more common — case.
loginTimeout=Your previous sign-in attempt ended. Please sign in again.
