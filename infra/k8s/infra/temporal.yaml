---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/part-of: jobcopilot
spec:
  selector:
    app.kubernetes.io/name: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/part-of: jobcopilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/part-of: jobcopilot
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.29.6
          ports:
            - containerPort: 7233
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_SEEDS
              value: postgres
            - name: LOG_LEVEL
              value: warn
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "temporal operator cluster health --address $(hostname -i):7233 2>&1 | grep -q SERVING"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "temporal operator cluster health --address $(hostname -i):7233 2>&1 | grep -q SERVING"
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
