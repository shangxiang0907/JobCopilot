---
# ConfigMap holds the init SQL that creates the keycloak database on first boot.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: jobcopilot
data:
  init.sql: |
    CREATE DATABASE keycloak;
---
# Headless service — required by StatefulSet for stable pod DNS.
# Apps connect to postgres:5432 directly (headless DNS resolves to pod IP).
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: jobcopilot
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: jobcopilot
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: jobcopilot
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: jobcopilot
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init-sql
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
