# cert-manager ClusterIssuers for TLS certificate management.
#
# Prerequisite: cert-manager must be installed in the cluster BEFORE applying this file.
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
#   kubectl -n cert-manager rollout status deployment/cert-manager --timeout=3m
#
# Usage:
#   - Use letsencrypt-staging first to verify the setup (no rate limits).
#   - Switch Ingress annotation to letsencrypt-prod when confirmed working.
#     cert-manager.io/cluster-issuer: "letsencrypt-prod"
#
# Replace REPLACE_WITH_YOUR_EMAIL with a real address — Let's Encrypt sends
# expiry warnings there, and it is required for account registration.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/part-of: jobcopilot
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: REPLACE_WITH_YOUR_EMAIL
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: kong
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/part-of: jobcopilot
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: REPLACE_WITH_YOUR_EMAIL
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: kong
