# Kong Gateway + Kong Ingress Controller (KIC v3) — all-in-one deployment.
#
# Architecture:
#   Pod contains two containers:
#     - proxy:              Kong 3.9 data plane (handles traffic)
#     - ingress-controller: KIC 3.4 control plane (watches Ingress resources,
#                           configures Kong via localhost:8001 Admin API)
#
# Prerequisites (install before kubectl apply -k infra/k8s/):
#   cert-manager:
#     kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
#     kubectl -n cert-manager rollout status deployment/cert-manager --timeout=3m
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kong-serviceaccount
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: jobcopilot
---
# ClusterRole covers cluster-scoped resources (Ingress, IngressClass, nodes).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kong-ingress-clusterrole
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: jobcopilot
rules:
  - apiGroups: [""]
    resources: [endpoints, nodes, pods, secrets, services, namespaces]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, ingressclasses]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses/status]
    verbs: [update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kong-ingress-clusterrole-binding
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: jobcopilot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kong-ingress-clusterrole
subjects:
  - kind: ServiceAccount
    name: kong-serviceaccount
    namespace: jobcopilot
---
# Role covers namespace-scoped resources (leases for KIC leader election).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kong-ingress-role
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: jobcopilot
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kong-ingress-role-binding
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: jobcopilot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kong-ingress-role
subjects:
  - kind: ServiceAccount
    name: kong-serviceaccount
    namespace: jobcopilot
---
# IngressClass: Ingress resources with ingressClassName: kong are handled by this controller.
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: kong
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: jobcopilot
spec:
  controller: ingress-controllers.konghq.com/kong
---
# Public-facing LoadBalancer for API traffic.
# KIC reads this service's external IP and writes it to each Ingress .status.loadBalancer.
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: jobcopilot
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: kong
  ports:
    - name: http
      port: 80
      targetPort: 8000
    - name: https
      port: 443
      targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: jobcopilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kong
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kong
        app.kubernetes.io/part-of: jobcopilot
    spec:
      serviceAccountName: kong-serviceaccount
      securityContext:
        runAsNonRoot: true
      containers:
        # ── Kong data plane ────────────────────────────────────────────────────
        - name: proxy
          image: kong:3.9
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - name: proxy
              containerPort: 8000
            - name: proxy-ssl
              containerPort: 8443
            - name: status
              containerPort: 8100
          env:
            - name: KONG_DATABASE
              value: "off"
            # KIC v3 generates route config in expressions format — must match.
            - name: KONG_ROUTER_FLAVOR
              value: "expressions"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000, 0.0.0.0:8443 ssl http2"
            # Admin API restricted to localhost; the KIC sidecar reaches it via pod-local network.
            - name: KONG_ADMIN_LISTEN
              value: "127.0.0.1:8001"
            - name: KONG_STATUS_LISTEN
              value: "0.0.0.0:8100"
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr
            - name: KONG_LOG_LEVEL
              value: warn
          readinessProbe:
            httpGet:
              path: /status/ready
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /status
              port: 8100
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi

        # ── KIC control plane ─────────────────────────────────────────────────
        - name: ingress-controller
          image: kong/kubernetes-ingress-controller:3.4
          securityContext:
            runAsUser: 65534
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          env:
            - name: CONTROLLER_KONG_ADMIN_URL
              value: "http://localhost:8001"
            - name: CONTROLLER_PUBLISH_SERVICE
              value: "jobcopilot/kong-proxy"
            - name: CONTROLLER_INGRESS_CLASS_NAME
              value: "kong"
            - name: CONTROLLER_LOG_LEVEL
              value: "warn"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10254
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10254
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
