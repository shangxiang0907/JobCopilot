---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: jobcopilot
data:
  jobcopilot-realm.json: |
    {
      "realm": "jobcopilot",
      "enabled": true,
      "displayName": "JobCopilot",
      "sslRequired": "external",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": true,
      "permanentLockout": false,
      "maxFailureWaitSeconds": 900,
      "minimumQuickLoginWaitSeconds": 60,
      "waitIncrementSeconds": 60,
      "quickLoginCheckMilliSeconds": 1000,
      "maxDeltaTimeSeconds": 43200,
      "failureFactor": 5,
      "defaultSignatureAlgorithm": "RS256",
      "accessTokenLifespan": 300,
      "accessTokenLifespanForImplicitFlow": 900,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 36000,
      "offlineSessionIdleTimeout": 2592000,
      "offlineSessionMaxLifespanEnabled": false,
      "accessCodeLifespan": 60,
      "accessCodeLifespanUserAction": 300,
      "accessCodeLifespanLogin": 1800,
      "internationalizationEnabled": false,
      "supportedLocales": ["en", "zh-CN"],
      "defaultLocale": "en",
      "roles": {
        "realm": [
          {"name": "admin", "description": "Platform administrator", "composite": false, "clientRole": false},
          {"name": "user", "description": "Regular authenticated user", "composite": false, "clientRole": false},
          {"name": "premium", "description": "Premium subscriber", "composite": false, "clientRole": false}
        ],
        "client": {}
      },
      "defaultRole": {"name": "user", "description": "Default role assigned to all new users"},
      "clients": [
        {
          "clientId": "api",
          "name": "JobCopilot API Resource Server",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "bearerOnly": true,
          "serviceAccountsEnabled": false,
          "standardFlowEnabled": false,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "protocolMappers": [
            {
              "name": "tenant-id-claim",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "false",
                "user.attribute": "tenant_id",
                "id.token.claim": "false",
                "access.token.claim": "true",
                "claim.name": "tenant_id",
                "jsonType.label": "String"
              }
            }
          ]
        },
        {
          "clientId": "frontend",
          "name": "JobCopilot Frontend",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": true,
          "bearerOnly": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "attributes": {
            "pkce.code.challenge.method": "S256",
            "post.logout.redirect.uris": "http://localhost:3000/*##https://REPLACE_WITH_PRODUCTION_DOMAIN/*"
          },
          "redirectUris": [
            "http://localhost:3000/*",
            "https://REPLACE_WITH_PRODUCTION_DOMAIN/*"
          ],
          "webOrigins": [
            "http://localhost:3000",
            "https://REPLACE_WITH_PRODUCTION_DOMAIN"
          ],
          "defaultClientScopes": ["web-origins", "acr", "profile", "roles", "email"],
          "optionalClientScopes": ["address", "phone", "offline_access", "microprofile-jwt"],
          "protocolMappers": [
            {
              "name": "tenant-id-claim",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "tenant_id",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "tenant_id",
                "jsonType.label": "String"
              }
            },
            {
              "name": "audience-api",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "consentRequired": false,
              "config": {
                "id.token.claim": "false",
                "access.token.claim": "true",
                "included.client.audience": "api"
              }
            }
          ]
        }
      ],
      "userProfileConfig": {
        "attributes": [
          {
            "name": "username",
            "displayName": "${username}",
            "validations": {"length": {"min": 3, "max": 255}, "username-prohibited-characters": {}},
            "permissions": {"view": ["admin", "user"], "edit": ["admin", "user"]},
            "multivalued": false
          },
          {
            "name": "email",
            "displayName": "${email}",
            "validations": {"email": {}, "length": {"max": 255}},
            "required": {"roles": ["user"]},
            "permissions": {"view": ["admin", "user"], "edit": ["admin", "user"]},
            "multivalued": false
          },
          {
            "name": "firstName",
            "displayName": "${firstName}",
            "validations": {"length": {"max": 255}, "person-name-prohibited-characters": {}},
            "permissions": {"view": ["admin", "user"], "edit": ["admin", "user"]},
            "multivalued": false
          },
          {
            "name": "lastName",
            "displayName": "${lastName}",
            "validations": {"length": {"max": 255}, "person-name-prohibited-characters": {}},
            "permissions": {"view": ["admin", "user"], "edit": ["admin", "user"]},
            "multivalued": false
          },
          {
            "name": "tenant_id",
            "displayName": "Tenant ID",
            "validations": {
              "length": {"max": 36},
              "pattern": {"pattern": "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$", "error-message": "Must be a valid UUID"}
            },
            "annotations": {"inputType": "text"},
            "permissions": {"view": ["admin"], "edit": ["admin"]},
            "multivalued": false
          }
        ],
        "groups": []
      },
      "eventsEnabled": false,
      "adminEventsEnabled": false,
      "adminEventsDetailsEnabled": false,
      "smtpServer": {}
    }
