# WARNING: Replace ALL placeholder values before applying to any cluster.
# Production recommendation: use Sealed Secrets, External Secrets Operator, or HashiCorp Vault
# instead of committing this file. Add secrets.yaml to .gitignore once real values are filled in.
---
apiVersion: v1
kind: Secret
metadata:
  name: jobcopilot-secrets
  namespace: jobcopilot
  labels:
    app.kubernetes.io/part-of: jobcopilot
type: Opaque
stringData:
  # 32-byte hex key for AES-256-GCM: openssl rand -hex 32
  ENCRYPTION_KEY: "CHANGE_ME_32_BYTE_HEX_KEY_HERE_000"

  # Database — update password to match postgres-secret below
  DATABASE_URL: "postgresql+asyncpg://postgres:CHANGE_ME@postgres:5432/jobcopilot"

  # RabbitMQ — update password to match rabbitmq-secret below
  RABBITMQ_URL: "amqp://guest:CHANGE_ME@rabbitmq:5672/"

  # LLM / Observability
  DASHSCOPE_API_KEY: "CHANGE_ME"
  LANGSMITH_API_KEY: "CHANGE_ME"

  # SMTP (notification service)
  SMTP_HOST: "CHANGE_ME"
  SMTP_USERNAME: "CHANGE_ME"
  SMTP_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: jobcopilot
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: jobcopilot
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: "guest"
  RABBITMQ_DEFAULT_PASS: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: jobcopilot
type: Opaque
stringData:
  KEYCLOAK_ADMIN: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "CHANGE_ME"
  KC_DB_PASSWORD: "CHANGE_ME"
