apiVersion: v1
kind: ConfigMap
metadata:
  name: jobcopilot-config
  namespace: jobcopilot
  labels:
    app.kubernetes.io/part-of: jobcopilot
data:
  ENVIRONMENT: "production"

  # Auth — backend services use the internal ClusterIP hostname for JWKS fetch
  KEYCLOAK_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "jobcopilot"
  KEYCLOAK_CLIENT_ID: "api"
  # Public-facing URL embedded in JWT iss claims; must match KC_HOSTNAME_URL on the Keycloak pod.
  # Keycloak 17+ removed the /auth context path — do NOT append /auth here.
  KEYCLOAK_ISSUER_URL: "https://REPLACE_WITH_PRODUCTION_DOMAIN"

  # Auth — browser-accessible URL for the frontend (window.__ENV__ injection)
  # KEYCLOAK_PUBLIC_URL must be reachable by end-user browsers.
  # Replace with your external Keycloak URL before deploying.
  KEYCLOAK_PUBLIC_URL: "https://REPLACE_WITH_PRODUCTION_DOMAIN"
  KEYCLOAK_CLIENT_ID_FRONTEND: "frontend"

  # Data stores (non-secret)
  REDIS_URL: "redis://redis:6379"
  QDRANT_URL: "http://qdrant:6333"

  # Workflow
  TEMPORAL_HOST: "temporal:7233"
  TEMPORAL_NAMESPACE: "jobcopilot"

  # LLM
  DASHSCOPE_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  LLM_MODEL: "qwen-max"
  LANGCHAIN_TRACING_V2: "false"

  # Embeddings
  EMBEDDING_MODEL: "text-embedding-v3"
  EMBEDDING_DIMENSIONS: "1024"

  # Profile service
  RESUME_STORAGE_PATH: "/data/resumes"
  MAX_RESUME_SIZE_MB: "10"

  # Discovery service
  PLAYWRIGHT_HEADLESS: "true"

  # Internal service URLs (used for inter-service calls)
  PROFILE_SERVICE_URL: "http://profile-service:8000"
  JOB_SERVICE_URL: "http://job-service:8000"

  # Notification
  SMTP_PORT: "587"
  SMTP_FROM_ADDRESS: "noreply@jobcopilot.ai"
  SMTP_USE_TLS: "true"
