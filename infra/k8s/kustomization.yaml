apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Resources are applied in the order listed. Namespace and config first,
# then infra dependencies, then application services.
resources:
  # 1. Namespace
  - namespace.yaml

  # 2. Config (ConfigMaps + Secrets)
  - config/configmap.yaml
  - config/keycloak-realm-configmap.yaml
  - sealed-secrets/sealed-secrets.yaml

  # 3. Infrastructure — stateful dependencies before services
  - infra/postgres.yaml
  - infra/redis.yaml
  - infra/rabbitmq.yaml
  - infra/qdrant.yaml
  - infra/keycloak.yaml
  - infra/keycloak-init-job.yaml
  - infra/temporal.yaml
  - infra/temporal-init-job.yaml
  - infra/temporal-ui.yaml

  # 4. API Gateway (KIC all-in-one + Ingress resources + TLS issuers)
  - gateway/kong.yaml
  - gateway/cert-issuer.yaml
  - gateway/ingress.yaml

  # 5. Application services
  - services/profile.yaml
  - services/job.yaml
  - services/discovery.yaml
  - services/agent.yaml
  - services/notification.yaml
  - services/frontend.yaml

  # 6. Network policies (applied last so selectors resolve)
  - network-policy.yaml
