---
apiVersion: v1
kind: Service
metadata:
  name: job-service
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: job-service
    app.kubernetes.io/part-of: jobcopilot
spec:
  selector:
    app.kubernetes.io/name: job-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-service
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: job-service
    app.kubernetes.io/part-of: jobcopilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: job-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: job-service
        app.kubernetes.io/part-of: jobcopilot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: job-service
          image: ghcr.io/YOUR_ORG/jobcopilot-job:latest
          command: ["/bin/sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: jobcopilot-config
            - secretRef:
                name: jobcopilot-secrets
          env:
            - name: SERVICE_NAME
              value: job-service
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8000
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: job-service
  namespace: jobcopilot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: job-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
