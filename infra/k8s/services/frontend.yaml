# Build-time args (baked into the JS bundle):
#   KONG_URL=http://kong:8000   (server-side rewrite target, stays internal)
#
# Runtime env vars (read by layout.tsx at request time, injected as window.__ENV__):
#   KEYCLOAK_PUBLIC_URL, KEYCLOAK_REALM, KEYCLOAK_CLIENT_ID
#   These let the same image work in every environment without rebuilding.
#
#   docker build --build-arg KONG_URL=http://kong:8000 -f frontend/Dockerfile \
#     -t ghcr.io/YOUR_ORG/jobcopilot-frontend:latest frontend/
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: jobcopilot
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: jobcopilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: jobcopilot
    spec:
      # node:20-alpine uses the built-in `node` user (uid=1000)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/jobcopilot-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: KEYCLOAK_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: jobcopilot-config
                  key: KEYCLOAK_PUBLIC_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: jobcopilot-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: jobcopilot-config
                  key: KEYCLOAK_CLIENT_ID_FRONTEND
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
