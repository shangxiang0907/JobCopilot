name: jobcopilot

# ─────────────────────────────────────────────────────────────────────────────
# Local development environment.
#
# Usage:
#   cp .env.example .env          # fill in at least ENCRYPTION_KEY
#   docker compose up --build -d
#
# Every published port binds to 127.0.0.1 only. On WSL2/Docker Desktop a bare
# "8010:8000" is published on ALL Windows host interfaces, exposing unauthenticated
# debug/internal ports to whatever LAN the machine is on. Loopback keeps browser
# access via localhost working while staying invisible to the network.
#
# Service ports on the host:
#   Kong proxy      http://localhost:8000   (all /v1/* API traffic)
#   Kong admin      http://localhost:8001
#   Keycloak        http://localhost:8080   (admin: admin/admin)
#   RabbitMQ UI     http://localhost:15672  (guest/guest)
#   Temporal UI     http://localhost:8233
#   Frontend        http://localhost:3000
#   Grafana         http://localhost:3001  (admin/admin in dev; datasources +
#                                           dashboards provisioned as code)
#   Prometheus      http://localhost:9090
#
# Direct service ports (debugging only, bypass Kong):
#   profile-service   :8010    job-service       :8011
#   discovery-service :8012    agent-service     :8013
#   notification-svc  :8014
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: jobcopilot
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8.8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.3-management-alpine@sha256:0753b75ce99094c385483d89449d532a0544fb85e4942a478b21cc497ab66d33
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.3@sha256:0bd98fa7977f1e75694779359ca4e212822e5a71334e28421182f72f209d5286
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.29.7@sha256:f14912b699cf73015ad5c4fc18d522d4b014db90e794039214dfb7c022c2644f
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SEEDS: postgres
      LOG_LEVEL: warn
    ports:
      - "127.0.0.1:7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233 2>&1 | grep -q SERVING"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.52.0@sha256:fc47cd8202c98ed868745fd9f2f011585232676d08da621b9a6d7bc4653c17aa
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8233
    ports:
      - "127.0.0.1:8233:8080"
    restart: unless-stopped

  # One-shot container: creates the `jobcopilot` Temporal namespace after server boots.
  temporal-namespace-init:
    image: temporalio/admin-tools:1.29.7-tctl-1.18.4-cli-1.7.2@sha256:4a17b5be706c56a9238fb7b5b32a36966cee14939658b20597837b2443b277c8
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    # The admin-tools image ENTRYPOINT is "tini -- sleep infinity", which
    # swallows any compose `command` as extra sleep args — the namespace was
    # NEVER created by this container until the entrypoint override below
    # (prod ran namespace-less; the old "|| echo skipped" masked it too).
    # describe-first + create fallback; NO error suppression — a failed
    # create must exit non-zero and be visible.
    entrypoint: ["sh", "-c"]
    command:
      - >-
        temporal operator namespace describe -n jobcopilot --address temporal:7233
        || temporal operator namespace create -n jobcopilot --retention 7d --address temporal:7233
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0@sha256:2eb3cd316835c990e69e26ade292ffa78f6fb0db7d5fc6377463c162e1979ac0
    command: ["start-dev", "--import-realm"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
    volumes:
      - ./keycloak/jobcopilot-realm.json:/opt/keycloak/data/import/jobcopilot-realm.json:ro
      # Directory mount (single-file mounts go stale on edit under WSL)
      - ./keycloak/themes/jobcopilot:/opt/keycloak/themes/jobcopilot:ro
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  kong:
    image: kong:3.9@sha256:62721edc9669e2a96fe9d188ab8950b9105e69abb033129624a72d3e10da6777
    depends_on:
      profile-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      agent-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_STATUS_LISTEN: 0.0.0.0:8100   # /metrics for Prometheus (prometheus plugin)
      KONG_LOG_LEVEL: warn
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Application Services ────────────────────────────────────────────────────
  #
  # Each service runs `alembic upgrade head` before starting uvicorn so schemas
  # are always up-to-date on container boot.

  profile-service:
    image: ghcr.io/shangxiang0907/jobcopilot-profile:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: services/profile/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      SERVICE_NAME: profile-service
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/jobcopilot
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: jobcopilot
      KEYCLOAK_CLIENT_ID: api
      # Service-account client for /v1/admin/users (created by keycloak-init)
      KEYCLOAK_ADMIN_API_SECRET: ${KEYCLOAK_ADMIN_API_SECRET:-dev-admin-api-secret}
      # ADR-007: byo = per-user keys (self-hosted default); platform = env key serves all
      LLM_KEY_MODE: ${LLM_KEY_MODE:-byo}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      EMBEDDING_MODEL: text-embedding-v3
      EMBEDDING_DIMENSIONS: "1024"
      RESUME_STORAGE_PATH: /data/resumes
      MAX_RESUME_SIZE_MB: "10"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # --workers 2 ⇒ /metrics must aggregate across worker processes.
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-metrics
    volumes:
      - resume_data:/data/resumes
    ports:
      - "127.0.0.1:8010:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn jobcopilot_profile.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/live')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  job-service:
    image: ghcr.io/shangxiang0907/jobcopilot-job:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: services/job/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVICE_NAME: job-service
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/jobcopilot
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: jobcopilot
      KEYCLOAK_CLIENT_ID: api
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # --workers 2 ⇒ /metrics must aggregate across worker processes.
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-metrics
    ports:
      - "127.0.0.1:8011:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn jobcopilot_job.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/live')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  discovery-service:
    image: ghcr.io/shangxiang0907/jobcopilot-discovery:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: services/discovery/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      SERVICE_NAME: discovery-service
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/jobcopilot
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      TEMPORAL_HOST: temporal:7233
      TEMPORAL_NAMESPACE: jobcopilot
      PROFILE_SERVICE_URL: http://profile-service:8000
      PLAYWRIGHT_HEADLESS: "true"
      # Per-source fetch cap; production overrides to 50 via .env. Small local
      # default keeps dev runs (and their pages/logs) cheap to inspect.
      DISCOVERY_PER_SOURCE_LIMIT: ${DISCOVERY_PER_SOURCE_LIMIT:-3}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: jobcopilot
      KEYCLOAK_CLIENT_ID: api
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "127.0.0.1:8012:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn jobcopilot_discovery.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/live')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  agent-service:
    image: ghcr.io/shangxiang0907/jobcopilot-agent:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: services/agent/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_NAME: agent-service
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/jobcopilot
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      # ADR-007: byo = per-user keys (self-hosted default); platform = env key serves all
      LLM_KEY_MODE: ${LLM_KEY_MODE:-byo}
      # Platform mode: per-tenant daily AI-action cap on the platform key (<=0 disables)
      LLM_DAILY_QUOTA: ${LLM_DAILY_QUOTA:-20}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen-max}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      # Must match the LangSmith account's region (ours: AWS US) — the default
      # endpoint rejects other regions' keys with a bare 403.
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-jobcopilot-local}
      PROFILE_SERVICE_URL: http://profile-service:8000
      JOB_SERVICE_URL: http://job-service:8000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: jobcopilot
      KEYCLOAK_CLIENT_ID: api
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "127.0.0.1:8013:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn jobcopilot_agent.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/live')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  notification-service:
    image: ghcr.io/shangxiang0907/jobcopilot-notification:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: services/notification/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_NAME: notification-service
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/jobcopilot
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: jobcopilot
      KEYCLOAK_CLIENT_ID: api
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@jobcopilot.ai}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "127.0.0.1:8014:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn jobcopilot_notification.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/live')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    image: ghcr.io/shangxiang0907/jobcopilot-frontend:${IMAGE_TAG:-latest}
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        KONG_URL: http://kong:8000
    depends_on:
      kong:
        condition: service_healthy
    environment:
      # Runtime env vars — injected into window.__ENV__ by layout.tsx at request time.
      # The browser reaches Keycloak via the host-exposed port, not the internal Docker hostname.
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: jobcopilot
      KEYCLOAK_CLIENT_ID: frontend
      # ADR-007: platform mode hides the BYO key UI (served via /env.js)
      LLM_KEY_MODE: ${LLM_KEY_MODE:-byo}
      # Canonical public origin — SEO metadata (canonical/OG URLs, robots, sitemap)
      SITE_URL: ${SITE_URL:-http://localhost:3000}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  # ── Observability ────────────────────────────────────────────────────────────
  # Metrics: services expose /metrics (jobcopilot_* prefix) → Prometheus → Grafana.
  # Logs: containers → Alloy (Docker discovery) → Loki → Grafana.
  # Grafana is provisioned as code (datasources + dashboards in ./grafana/).
  # In production all four stay loopback-bound — access Grafana via SSH tunnel:
  #   ssh -L 3001:localhost:3001 <server>

  prometheus:
    image: prom/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.3@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.17.1@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
    command: ["run", "/etc/alloy/config.alloy"]
    depends_on:
      - loki
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Read-only Docker socket: required to discover containers and tail logs.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

  # Hourly purge of never-verified users past a TTL: with email-as-username an
  # unverified registration squats the address (the real owner cannot register);
  # the records also hold PII of people who never completed sign-up. Uses the
  # least-privilege admin-api service account, never master admin credentials.
  keycloak-cleanup:
    image: python:3.14-alpine@sha256:26730869004e2b9c4b9ad09cab8625e81d256d1ce97e72df5520e806b1709f92
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./keycloak/cleanup-unverified.py:/cleanup-unverified.py:ro
    command: ["python3", "/cleanup-unverified.py"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: jobcopilot
      KEYCLOAK_ADMIN_API_SECRET: ${KEYCLOAK_ADMIN_API_SECRET:-dev-admin-api-secret}
      UNVERIFIED_USER_TTL_HOURS: ${UNVERIFIED_USER_TTL_HOURS:-24}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-3600}
    restart: unless-stopped

  keycloak-init:
    image: python:3.14-alpine@sha256:26730869004e2b9c4b9ad09cab8625e81d256d1ce97e72df5520e806b1709f92
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./keycloak/init-realm.py:/init-realm.py:ro
    command: ["python3", "/init-realm.py"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: jobcopilot
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      FRONTEND_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      # v0.2 self-registration wiring: registration email verification + Google
      # login + the least-privilege service account used by /v1/admin/users.
      # All optional — the script skips whatever is unset.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@jobcopilot.ai}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KEYCLOAK_ADMIN_API_SECRET: ${KEYCLOAK_ADMIN_API_SECRET:-dev-admin-api-secret}
    restart: "no"

  # Dev-only SMTP catcher (profile-gated, never started in prod). Setting
  # SMTP_HOST=mailpit in the local .env turns on Keycloak verifyEmail, which
  # makes the full registration → verify-link → set-password flow testable
  # locally without sending real mail. Web UI: http://localhost:8025
  mailpit:
    image: axllent/mailpit:v1.30.4@sha256:5a49a77c5bdbe7c5474450b4f46348d09949df3695257729c93a30369382d4f6
    profiles: ["dev"]
    ports:
      - "127.0.0.1:8025:8025"
    restart: unless-stopped

