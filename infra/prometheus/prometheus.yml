# Prometheus scrape config — single-node Docker Compose deployment.
# Metric naming: every app metric is prefixed `jobcopilot_`; services all expose
# the SAME metric names and are distinguished by the `job` label set here.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: profile-service
    static_configs:
      - targets: ["profile-service:8000"]

  - job_name: job-service
    static_configs:
      - targets: ["job-service:8000"]

  - job_name: discovery-service
    static_configs:
      - targets: ["discovery-service:8000"]

  - job_name: agent-service
    static_configs:
      - targets: ["agent-service:8000"]

  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:8000"]

  # Kong gateway metrics (prometheus plugin, exposed on the status API).
  - job_name: kong
    static_configs:
      - targets: ["kong:8100"]
