# Automated dependency updates. Grouped per ecosystem to keep PR volume low;
# every PR still runs the full CI (lint / typecheck / tests / build).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend:
        patterns: ["*"]

  - package-ecosystem: docker
    directories:
      - /frontend
      - /services/profile
      - /services/job
      - /services/discovery
      - /services/agent
      - /services/notification
    schedule:
      interval: weekly
    groups:
      base-images:
        patterns: ["*"]

  - package-ecosystem: docker-compose
    directory: /infra
    schedule:
      interval: weekly
    groups:
      # Stateful services first (a dependency joins the FIRST matching group):
      # upgrades here can require data/schema migrations (postgres data-dir
      # format, Keycloak realm, RabbitMQ mnesia→khepri, Temporal schema — and
      # temporalio/* siblings must stay on the SAME version, see CLAUDE.md).
      # Review deliberately; never auto-merge.
      stateful-images:
        patterns:
          - "postgres"
          - "quay.io/keycloak/keycloak"
          - "temporalio/*"
          - "qdrant/qdrant"
          - "rabbitmq"
          - "redis"
      # Everything else (edge/observability/helpers): CI-green is usually
      # enough to merge.
      stateless-images:
        patterns: ["*"]
