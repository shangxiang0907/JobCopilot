# Automated dependency updates. Grouped per ecosystem to keep PR volume low;
# every PR still runs the full CI (lint / typecheck / tests / build).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend:
        patterns: ["*"]

  - package-ecosystem: docker
    directories:
      - /frontend
      - /services/profile
      - /services/job
      - /services/discovery
      - /services/agent
      - /services/notification
    schedule:
      interval: weekly
    groups:
      base-images:
        patterns: ["*"]

  - package-ecosystem: docker-compose
    directory: /infra
    schedule:
      interval: weekly
    # One PR per stateful component + temporal + stateless can exceed the
    # default limit of 5 concurrent PRs, which starves the queue (observed:
    # keycloak's PR never surfaced). 10 covers the full matrix.
    open-pull-requests-limit: 10
    # Grouping policy: group ONLY what must move together (temporal siblings)
    # or what is low-risk enough to merge on green CI (stateless). Stateful
    # components (postgres, keycloak, qdrant, rabbitmq, redis) deliberately
    # get ONE PR EACH — their upgrades can require data/schema migrations, and
    # an individual PR is accepted/deferred by simply merging/not merging it.
    # Note: Dependabot strips the registry host from compose dependency names
    # ("keycloak/keycloak", not "quay.io/keycloak/keycloak").
    groups:
      # temporalio/* siblings must stay on the SAME version (CLAUDE.md) —
      # separate PRs would tear them apart.
      temporal:
        patterns: ["temporalio/*"]
      # Edge/observability/helpers: CI-green is usually enough to merge.
      stateless-images:
        patterns: ["*"]
        exclude-patterns:
          - "postgres"
          - "keycloak/keycloak"
          - "qdrant/qdrant"
          - "rabbitmq"
          - "redis"
          - "temporalio/*"
