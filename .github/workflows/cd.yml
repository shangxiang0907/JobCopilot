name: CD

# Triggered only after the CI workflow completes successfully on main.
# This guarantees CD never runs on a red commit, even on direct pushes.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  # ── 1. Build & Push all images to ghcr.io ────────────────────────────────────
  build-push:
    name: Build & Push / ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: profile
            dockerfile: services/profile/Dockerfile
            context: .
          - name: job
            dockerfile: services/job/Dockerfile
            context: .
          - name: discovery
            dockerfile: services/discovery/Dockerfile
            context: .
          - name: agent
            dockerfile: services/agent/Dockerfile
            context: .
          - name: notification
            dockerfile: services/notification/Dockerfile
            context: .
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
            build_args: "KONG_URL=http://kong:8000"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v4.1.0

      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobcopilot-${{ matrix.service.name }}:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ github.repository_owner }}/jobcopilot-${{ matrix.service.name }}:latest
          # GIT_SHA is baked into every image (ENV) and mirrored as the standard
          # OCI revision label — /healthz, jobcopilot_build_info, and deploy.sh's
          # post-deploy verification all read the same value.
          build-args: |
            GIT_SHA=${{ github.event.workflow_run.head_sha }}
            ${{ matrix.service.build_args }}
          labels: |
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 1b. E2E smoke against the exact images just pushed ───────────────────────
  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: build-push
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start the stack from the just-built images
        working-directory: infra
        env:
          E2E_IMAGE_OWNER: ${{ github.repository_owner }}
          E2E_IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          # .env.e2e, NOT .env.example — the latter is the production template
          # and would point the browser at the production Keycloak.
          cp .env.e2e .env
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
            up -d --no-build --quiet-pull

      - name: Wait for stack readiness
        working-directory: infra
        run: |
          # Keycloak realm + frontend up, and Kong answering 401 on a routed
          # /v1 path (proves gateway, route table, and JWT plugin are live).
          for i in $(seq 1 90); do
            kc=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/realms/jobcopilot || true)
            fe=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000 || true)
            kong=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/v1/applications || true)
            if [ "$kc" = "200" ] && [ "$fe" = "200" ] && [ "$kong" = "401" ]; then
              echo "Stack ready after ${i} polls"
              # The realm init one-shot must have finished (declares the
              # tenant_id user-profile attribute) before creating users.
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml wait keycloak-init
              exit 0
            fi
            sleep 5
          done
          echo "Stack failed to become ready" >&2
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml ps -a
          exit 1

      - name: Create E2E test user
        run: ./infra/scripts/create-test-user.sh

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run Playwright smoke suite
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-artifacts
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Dump stack logs on failure
        if: failure()
        working-directory: infra
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs --tail=80

  # ── 2. Trivy image scan — Critical CVE blocks the pipeline ───────────────────
  image-scan:
    name: Image Scan / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [profile, job, discovery, agent, notification, frontend]
    steps:
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan ${{ matrix.service }} for Critical CVEs (blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/jobcopilot-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true

      - name: Report all CVEs including unfixed (non-blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/jobcopilot-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}
          format: table
          exit-code: "0"
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: false

  # ── 3. Deploy to Kubernetes ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [image-scan, e2e-smoke]
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Apply manifests
        run: |
          # To activate this step:
          #   1. Add a KUBECONFIG repository secret (Settings → Secrets → Actions).
          #   2. Uncomment the lines below.
          #
          # echo "${{ secrets.KUBECONFIG }}" > /tmp/kubeconfig.yaml
          # chmod 600 /tmp/kubeconfig.yaml
          # export KUBECONFIG=/tmp/kubeconfig.yaml
          #
          # Apply all manifests via kustomize (respects resource ordering in kustomization.yaml).
          # kubectl apply -k infra/k8s/
          #
          # Force a rolling restart so pods pull the new :latest image.
          # kubectl rollout restart deployment -n jobcopilot
          #
          # Block until all deployments are healthy (fail CD if rollout gets stuck).
          # kubectl rollout status deployment -n jobcopilot --timeout=5m
          echo "Deploy step ready. Add KUBECONFIG secret and uncomment kubectl commands to activate."
