name: CD

# Triggered only after the CI workflow completes successfully on main.
# This guarantees CD never runs on a red commit, even on direct pushes.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  # ── 1. Build & Push all images to ghcr.io ────────────────────────────────────
  build-push:
    name: Build & Push / ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: profile
            dockerfile: services/profile/Dockerfile
            context: .
          - name: job
            dockerfile: services/job/Dockerfile
            context: .
          - name: discovery
            dockerfile: services/discovery/Dockerfile
            context: .
          - name: agent
            dockerfile: services/agent/Dockerfile
            context: .
          - name: notification
            dockerfile: services/notification/Dockerfile
            context: .
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
            build_args: "KONG_URL=http://kong:8000"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobcopilot-${{ matrix.service.name }}:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ github.repository_owner }}/jobcopilot-${{ matrix.service.name }}:latest
          build-args: ${{ matrix.service.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Trivy image scan — Critical CVE blocks the pipeline ───────────────────
  image-scan:
    name: Image Scan / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [profile, job, discovery, agent, notification, frontend]
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan ${{ matrix.service }} for Critical CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/jobcopilot-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL

  # ── 3. Deploy to Kubernetes ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: image-scan
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Apply manifests
        run: |
          # To activate this step:
          #   1. Add a KUBECONFIG repository secret (Settings → Secrets → Actions).
          #   2. Uncomment the lines below.
          #
          # echo "${{ secrets.KUBECONFIG }}" > /tmp/kubeconfig.yaml
          # chmod 600 /tmp/kubeconfig.yaml
          #
          # Apply the full declarative manifests — keeps cluster state in sync with repo.
          # kubectl --kubeconfig /tmp/kubeconfig.yaml apply -f infra/k8s/
          #
          # Force a rolling restart so pods pull the new :latest image.
          # kubectl --kubeconfig /tmp/kubeconfig.yaml rollout restart deployment -n jobcopilot
          #
          # Block until all deployments are healthy (fail CD if rollout gets stuck).
          # kubectl --kubeconfig /tmp/kubeconfig.yaml rollout status deployment -n jobcopilot --timeout=5m
          echo "Deploy step ready. Add KUBECONFIG secret and uncomment kubectl commands to activate."
