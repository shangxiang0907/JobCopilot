[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jobcopilot-shared"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111.0",
    "sqlalchemy>=2.0.0",
    "asyncpg>=0.29.0",
    "redis>=5.0.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "cryptography>=42.0.0",
    "httpx>=0.27.0",
    "python-jose[cryptography]>=3.3.0",
    "structlog>=24.1.0",
    "starlette>=0.37.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["jobcopilot_shared"]
